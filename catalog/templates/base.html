<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipeSelector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .navbar {
            background-color: #1a1d20 !important;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .nav-link {
            font-weight: 500;
        }
        .hero-section {
            background: linear-gradient(135deg, #2b3238 0%, #1a1d20 100%);
            color: white;
            border-radius: 1rem;
            padding: 4rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .catalog-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 100%;
        }
        .catalog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .card-icon {
            font-size: 2rem;
            color: #0d6efd;
            margin-bottom: 1rem;
        }
        .property-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }
        .property-row:last-child {
            border-bottom: none;
        }
        .property-label {
            color: #6c757d;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .property-value {
            font-weight: 600;
            color: #212529;
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-layers-fill me-2"></i>PipeSelector</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'calculator' %}"><i class="bi bi-calculator me-1"></i>Калькулятор</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pipe_list' %}"><i class="bi bi-distribute-vertical me-1"></i>Трубы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'valve_list' %}"><i class="bi bi-vinyl-fill me-1"></i>Арматура</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
