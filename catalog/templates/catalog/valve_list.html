{% extends 'base.html' %}

{% block content %}
<h2 class="fw-bold mb-4"><i class="bi bi-vinyl-fill me-2 text-primary"></i>Каталог арматуры</h2>
<div class="row g-4">
    {% for valve in valves %}
    <div class="col-md-6 col-lg-4">
        <div class="card catalog-card">
            <div class="card-body">
                <h5 class="fw-bold mb-3">
                    <a href="{% url 'valve_detail' valve.id %}" class="text-decoration-none text-dark">{{ valve.name }}</a>
                </h5>
                <div class="property-row">
                    <span class="property-label">Тип</span>
                    <span class="property-value">{{ valve.valve_type }}</span>
                </div>
                <div class="property-row">
                    <span class="property-label">Диаметр</span>
                    <span class="property-value">{{ valve.diameter_mm }} мм</span>
                </div>
                <div class="property-row">
                    <span class="property-label">Давление</span>
                    <span class="property-value">{{ valve.max_pressure_bar }} бар</span>
                </div>
                <div class="mt-3 text-end">
                    <a href="{% url 'valve_detail' valve.id %}" class="btn btn-sm btn-outline-primary">Подробнее</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
